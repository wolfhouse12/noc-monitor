name: Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python check.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}

      - name: Commit updated status
        run: |
          git config user.name "noc-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "Update status $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
